# Build the Astro site and publish to the gh-pages branch for GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, astro_migration]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro check
        run: npm run check
        env:
          ASTRO_TELEMETRY_DISABLED: '1'

      - name: Build
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
          # Optional: repo Settings → Variables — set for a custom root domain, e.g. ASTRO_BASE=/, ASTRO_SITE=https://www.example.com
          ASTRO_SITE: ${{ vars.ASTRO_SITE }}
          ASTRO_BASE: ${{ vars.ASTRO_BASE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
